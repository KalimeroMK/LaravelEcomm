# =============================================================================
# DOCKER COMPOSE - PRODUCTION
# =============================================================================
# Овој фајл е за продукција. Користи:
# docker-compose -f docker-compose.prod.yml up -d
#
# Напомена: Cloudflare тунелот е ЦЕНТРАЛИЗИРАН во /root/cloudflare-tunnel/
# и веќе е поврзан со e-comm_laravelapp мрежата.
# =============================================================================

services:
  app:
    build:
      context: .docker
      dockerfile: Dockerfile
    container_name: e_comm_app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./:/var/www
      - ./.docker/php/conf.d/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./.docker/php/conf.d/performance.ini:/usr/local/etc/php/conf.d/performance.ini
    networks:
      - laravelapp
    # Во продукција не expose-ираме порти надвор - само преку Cloudflare тунел
    # Тунелот е во /root/cloudflare-tunnel/ и е поврзан на e-comm_laravelapp мрежа
    # ports:
    #   - "90:80"
    healthcheck:
      test: [ "CMD", "php", "artisan", "--version" ]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      - SERVER_NAME=:80
      - PHP_OPCACHE_ENABLE=1
      - PHP_OPCACHE_MEMORY_CONSUMPTION=128
      - PHP_OPCACHE_MAX_ACCELERATED_FILES=4000
      - PHP_OPCACHE_REVALIDATE_FREQ=2
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - ELASTICSEARCH_HOST=elasticsearch
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  db:
    image: mariadb:11.4
    container_name: e_comm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: homestead
      MYSQL_USER: homestead
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
      MARIADB_AUTO_UPGRADE: 1
    command: >
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --max-connections=200
    volumes:
      - mysql_data:/var/lib/mysql
      - ./.docker/mysql/my.cnf:/etc/mysql/my.cnf
      - ./.docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - laravelapp
    # Само интерно - не expose надвор
    # ports:
    #   - "3311:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      retries: 3
      start_period: 30s
      timeout: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:alpine
    container_name: e_comm_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks:
      - laravelapp
    # Само интерно
    # ports:
    #   - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      retries: 3
      start_period: 5s
      timeout: 10s

  elasticsearch:
    image: elasticsearch:8.16.1
    container_name: e_comm_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - laravelapp
    # Само интерно
    # ports:
    #   - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      retries: 3
      start_period: 60s
      timeout: 10s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # ⚠️ ВАЖНО: Cloudflare тунелот е ЦЕНТРАЛИЗИРАН во /root/cloudflare-tunnel/
  # Не додавај cloudflared сервис овде!
  # Тунелот е веќе поврзан со e-comm_laravelapp мрежата.

networks:
  laravelapp:
    driver: bridge
    # Оваа мрежа е external за централниот cloudflared тунел
    # name: e-comm_laravelapp

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local
